<!DOCTYPE html>
<html>
  <body style="margin:0; padding:0; font-family:Arial, sans-serif; background:#ffffff;">

    <!-- Top green bar -->
    <table width="100%" cellpadding="0" cellspacing="0">
      <tr>
        <td style="background:#0f3d0f; height:18px;"></td>
      </tr>
    </table>

    <!-- Main container -->
    <table width="100%" cellpadding="0" cellspacing="0">
      <tr>
        <td align="center" style="padding:30px 0;">

          <table width="520" cellpadding="0" cellspacing="0"
            style="border:1px solid #dcdcdc; background:#ffffff; padding:25px;">

            <!-- Logo -->
            <tr>
              <td align="center" style="padding-bottom:20px;">
                <img
                  src="http://192.168.1.4:8000/uploads/logo/sagipbayanlogo.png"
                  alt="SagipBayan"
                  width="140"
                  style="display:block;"
                />
              </td>
            </tr>

            <!-- Title -->
            <tr>
              <td>
                <h2 style="margin:0;">Verify your email</h2>
              </td>
            </tr>

            <!-- Message -->
            <tr>
              <td style="padding-top:15px; font-size:14px; color:#333;">
                Hi <strong>{{FIRST_NAME}}</strong>,<br /><br />
                Thanks for signing up. Please click the button below to verify your email.
              </td>
            </tr>

            <!-- BUTTON (THIS IS THE IMPORTANT PART) -->
            <tr>
              <td align="center" style="padding:25px 0;">
                <a
                  href="{{VERIFY_BUTTON}}"
                  style="
                    background:#166534;
                    color:#ffffff;
                    padding:14px 28px;
                    text-decoration:none;
                    border-radius:6px;
                    display:inline-block;
                    font-weight:bold;
                  "
                >
                  Verify Email
                </a>
              </td>
            </tr>

            <!-- Footer -->
            <tr>
              <td style="font-size:12px; color:#777;">
                If you didn’t create this account, ignore this email.
              </td>
            </tr>

          </table>

        </td>
      </tr>
    </table>

    <!-- Bottom green bar -->
    <table width="100%" cellpadding="0" cellspacing="0">
      <tr>
        <td style="background:#0f3d0f; height:18px;"></td>
      </tr>
    </table>

  </body>
</html>
